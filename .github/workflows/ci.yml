name: CI  # Workflow nimi

on:  # Milloin ajetaan
  push:  # Pushista
    branches: ["main"]  # Vain main
  pull_request:  # PR:stä
    branches: ["main"]  # Vain main

jobs:  # Työt
  build:  # Työn nimi
    runs-on: ubuntu-latest  # GitHubin Linux-kone

    steps:  # Askel lista
      - name: Checkout code  # Hakee reposta koodin
        uses: actions/checkout@v4  # Checkout action

      - name: Set up Python  # Asentaa Pythonin
        uses: actions/setup-python@v5  # Python action
        with:
          python-version: "3.11"  # Python versio

      - name: Install dependencies  # Asenna paketit
        run: pip install -r requirements.txt  # Asentaa requirements.txt

      - name: Import check  # Tarkista että appi käynnistyy/importtaa
        run: python -c "from app.main import app; print('OK')"  # Pieni testi